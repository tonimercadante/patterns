<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700&display=swap");

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0e0e0e;
        --panel: #161616;
        --border: #2a2a2a;
        --text: #e0e0e0;
        --muted: #555;
        --accent: #fff;
        --track: #222;
        --thumb: #fff;
        --section-gap: 24px;
      }

      body {
        background: var(--bg);
        font-family: "DM Mono", monospace;
        color: var(--text);
        display: flex;
        height: 100vh;
      }

      #panel {
        width: 240px;
        min-width: 240px;
        background: var(--panel);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: thin;
        scrollbar-color: #2a2a2a transparent;
      }

      #panel::-webkit-scrollbar {
        width: 4px;
      }
      #panel::-webkit-scrollbar-track {
        background: transparent;
      }
      #panel::-webkit-scrollbar-thumb {
        background: #2a2a2a;
        border-radius: 2px;
      }

      .panel-header {
        padding: 16px 16px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .panel-header svg {
        opacity: 0.5;
        flex-shrink: 0;
      }

      .panel-header span {
        font-family: "Syne", sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text);
      }

      .section {
        padding: 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .section-title {
        font-family: "Syne", sans-serif;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .section-title svg {
        opacity: 0.5;
      }

      .control-row {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .control-label {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .control-label span:first-child {
        font-size: 11px;
        color: #aaa;
        font-weight: 300;
      }

      .control-label .value {
        font-size: 11px;
        color: var(--text);
        font-weight: 500;
        min-width: 36px;
        text-align: right;
      }

      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 2px;
        background: var(--track);
        border-radius: 2px;
        outline: none;
        cursor: pointer;
        position: relative;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--thumb);
        cursor: pointer;
        transition: transform 0.15s;
      }

      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.3);
      }

      input[type="range"]::-moz-range-thumb {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--thumb);
        border: none;
        cursor: pointer;
      }

      /* Color swatches */
      .color-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .color-group-label {
        font-size: 11px;
        color: #aaa;
        font-weight: 300;
      }

      .swatches {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }

      .swatch {
        width: 22px;
        height: 22px;
        border-radius: 4px;
        cursor: pointer;
        border: 1.5px solid transparent;
        transition:
          transform 0.1s,
          border-color 0.1s;
        flex-shrink: 0;
      }

      .swatch:hover {
        transform: scale(1.15);
      }
      .swatch.active {
        border-color: #fff;
      }

      .swatch-add {
        width: 22px;
        height: 22px;
        border-radius: 4px;
        border: 1.5px dashed var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--muted);
        font-size: 14px;
        transition:
          border-color 0.15s,
          color 0.15s;
        position: relative;
        overflow: hidden;
      }

      .swatch-add input[type="color"] {
        position: absolute;
        opacity: 0;
        width: 100%;
        height: 100%;
        cursor: pointer;
      }

      .swatch-add:hover {
        border-color: #aaa;
        color: #aaa;
      }

      /* Toggle */
      .toggle-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .toggle-row span {
        font-size: 11px;
        color: #aaa;
        font-weight: 300;
      }

      .toggle {
        width: 32px;
        height: 18px;
        background: var(--track);
        border-radius: 9px;
        cursor: pointer;
        position: relative;
        transition: background 0.2s;
        border: 1px solid var(--border);
        flex-shrink: 0;
      }

      .toggle.on {
        background: #fff;
      }

      .toggle::after {
        content: "";
        position: absolute;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #555;
        top: 2px;
        left: 2px;
        transition:
          left 0.2s,
          background 0.2s;
      }

      .toggle.on::after {
        left: 16px;
        background: #111;
      }

      /* Canvas area */
      #canvas-area {
        flex: 1;
        background: var(--bg);
        position: relative;
        cursor: crosshair;
      }

      .canvas-hint {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 0.08em;
        pointer-events: none;
        white-space: nowrap;
      }

      .canvas-hint span {
        background: #1a1a1a;
        border: 1px solid var(--border);
        padding: 4px 10px;
        border-radius: 20px;
      }
    </style>
  </head>
  <body>
    <div id="panel">
      <div class="panel-header">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="1" y="3" width="12" height="1.5" fill="white" />
          <rect x="1" y="6.5" width="12" height="1.5" fill="white" />
          <rect x="1" y="10" width="12" height="1.5" fill="white" />
        </svg>
        <span>Slash Settings</span>
      </div>

      <div class="section">
        <div class="control-row">
          <div class="control-label">
            <span>Size</span>
            <span class="value" id="val-size">5px</span>
          </div>
          <input type="range" id="size" min="2" max="30" value="5" step="1" />
        </div>

        <div class="control-row">
          <div class="control-label">
            <span>Stroke Width</span>
            <span class="value" id="val-stroke">1px</span>
          </div>
          <input type="range" id="stroke" min="1" max="10" value="1" step="1" />
        </div>

        <div class="control-row">
          <div class="control-label">
            <span>Angle</span>
            <span class="value" id="val-angle">0°</span>
          </div>
          <input type="range" id="angle" min="0" max="360" value="0" step="1" />
        </div>

        <div class="control-row">
          <div class="control-label">
            <span>Density</span>
            <span class="value" id="val-density">100%</span>
          </div>
          <input
            type="range"
            id="density"
            min="10"
            max="100"
            value="100"
            step="5"
          />
        </div>

        <div class="control-row">
          <div class="control-label">
            <span>Spacing</span>
            <span class="value" id="val-spacing">0px</span>
          </div>
          <input
            type="range"
            id="spacing"
            min="0"
            max="20"
            value="0"
            step="1"
          />
        </div>

        <div class="control-row">
          <div class="control-label">
            <span>Opacity</span>
            <span class="value" id="val-opacity">100%</span>
          </div>
          <input
            type="range"
            id="opacity"
            min="10"
            max="100"
            value="100"
            step="5"
          />
        </div>
      </div>

      <div class="section">
        <div class="section-title">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <circle cx="6" cy="6" r="5" stroke="white" stroke-width="1.5" />
            <circle cx="6" cy="6" r="2" fill="white" />
          </svg>
          Colors
        </div>

        <div class="color-group">
          <div class="color-group-label">Stroke Color</div>
          <div class="swatches" id="stroke-swatches">
            <div
              class="swatch active"
              style="background: #fff"
              data-color="#fff"
            ></div>
            <div
              class="swatch"
              style="background: #3b82f6"
              data-color="#3b82f6"
            ></div>
            <div
              class="swatch"
              style="background: #22c55e"
              data-color="#22c55e"
            ></div>
            <div
              class="swatch"
              style="background: #eab308"
              data-color="#eab308"
            ></div>
            <div
              class="swatch"
              style="background: #ef4444"
              data-color="#ef4444"
            ></div>
            <div
              class="swatch"
              style="background: #a855f7"
              data-color="#a855f7"
            ></div>
            <div
              class="swatch"
              style="background: #ec4899"
              data-color="#ec4899"
            ></div>
            <div
              class="swatch"
              style="background: #06b6d4"
              data-color="#06b6d4"
            ></div>
            <div class="swatch-add" title="Custom color">
              +
              <input type="color" id="custom-stroke-color" value="#ffffff" />
            </div>
          </div>
        </div>

        <div class="color-group">
          <div class="color-group-label">Background</div>
          <div class="swatches" id="bg-swatches">
            <div
              class="swatch active"
              style="
                background: repeating-conic-gradient(#333 0% 25%, #111 0% 50%) 0
                  0 / 10px 10px;
              "
              data-color="transparent"
              title="Transparent"
            ></div>
            <div
              class="swatch"
              style="background: #111"
              data-color="#111"
            ></div>
            <div
              class="swatch"
              style="background: #1a3a1a"
              data-color="#1a3a1a"
            ></div>
            <div
              class="swatch"
              style="background: #1a1a3a"
              data-color="#1a1a3a"
            ></div>
            <div
              class="swatch"
              style="background: #3a1a1a"
              data-color="#3a1a1a"
            ></div>
            <div class="swatch-add" title="Custom color">
              +
              <input type="color" id="custom-bg-color" value="#111111" />
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <rect
              x="1"
              y="1"
              width="4"
              height="10"
              stroke="white"
              stroke-width="1.2"
            />
            <rect
              x="7"
              y="1"
              width="4"
              height="10"
              stroke="white"
              stroke-width="1.2"
            />
          </svg>
          Transform
        </div>

        <div class="toggle-row">
          <span>Mirror X</span>
          <div class="toggle" id="toggle-mirrorX"></div>
        </div>

        <div class="toggle-row">
          <span>Mirror Y</span>
          <div class="toggle" id="toggle-mirrorY"></div>
        </div>
      </div>
    </div>

    <div id="canvas-area">
      <div class="canvas-hint">
        <span>Drag to create a box · Click box to fill pattern</span>
      </div>
    </div>

    <script>
      // Sliders
      const sliders = [
        { id: "size", valId: "val-size", suffix: "px" },
        { id: "stroke", valId: "val-stroke", suffix: "px" },
        { id: "angle", valId: "val-angle", suffix: "°" },
        { id: "density", valId: "val-density", suffix: "%" },
        { id: "spacing", valId: "val-spacing", suffix: "px" },
        { id: "opacity", valId: "val-opacity", suffix: "%" },
      ];

      sliders.forEach(({ id, valId, suffix }) => {
        const input = document.getElementById(id);
        const display = document.getElementById(valId);
        input.addEventListener("input", () => {
          display.textContent = input.value + suffix;
        });
      });

      // Swatches
      function initSwatches(containerId) {
        const container = document.getElementById(containerId);
        container.querySelectorAll(".swatch").forEach((s) => {
          s.addEventListener("click", () => {
            container
              .querySelectorAll(".swatch")
              .forEach((x) => x.classList.remove("active"));
            s.classList.add("active");
          });
        });
      }

      initSwatches("stroke-swatches");
      initSwatches("bg-swatches");

      // Custom color pickers
      document
        .getElementById("custom-stroke-color")
        .addEventListener("input", (e) => {
          const swatches = document.getElementById("stroke-swatches");
          swatches
            .querySelectorAll(".swatch")
            .forEach((x) => x.classList.remove("active"));
          const add = swatches.querySelector(".swatch-add");
          add.style.background = e.target.value;
          add.style.borderStyle = "solid";
          add.style.borderColor = "transparent";
          add.querySelector("input").dataset.color = e.target.value;
          add.classList.add("active");
          add.textContent = "";
          add.appendChild(document.getElementById("custom-stroke-color"));
        });

      document
        .getElementById("custom-bg-color")
        .addEventListener("input", (e) => {
          const swatches = document.getElementById("bg-swatches");
          swatches
            .querySelectorAll(".swatch")
            .forEach((x) => x.classList.remove("active"));
          const add = swatches.querySelector(".swatch-add");
          add.style.background = e.target.value;
          add.style.borderStyle = "solid";
          add.style.borderColor = "transparent";
          add.classList.add("active");
          add.textContent = "";
          add.appendChild(document.getElementById("custom-bg-color"));
        });

      // Toggles
      document.querySelectorAll(".toggle").forEach((toggle) => {
        toggle.addEventListener("click", () => toggle.classList.toggle("on"));
      });

      // Expose settings getter
      window.getSettings = () => ({
        size: parseInt(document.getElementById("size").value),
        stroke: parseInt(document.getElementById("stroke").value),
        angle: parseInt(document.getElementById("angle").value),
        density: parseInt(document.getElementById("density").value) / 100,
        spacing: parseInt(document.getElementById("spacing").value),
        opacity: parseInt(document.getElementById("opacity").value) / 100,
        strokeColor:
          document.querySelector("#stroke-swatches .swatch.active")?.dataset
            .color || "#fff",
        bgColor:
          document.querySelector("#bg-swatches .swatch.active")?.dataset
            .color || "transparent",
        mirrorX: document
          .getElementById("toggle-mirrorX")
          .classList.contains("on"),
        mirrorY: document
          .getElementById("toggle-mirrorY")
          .classList.contains("on"),
      });
    </script>
  </body>
</html>
